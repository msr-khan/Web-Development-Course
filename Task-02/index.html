<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catchhub App Showcase</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="container header-container">
            <div class="logo">
                <img src="assets/logo.png" alt="Catchhub Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#screens">Screenshots</a></li>
                    <li><a href="#download">Download</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-container">
            <div class="hero-content">
                <h1>Welcome to Catchhub</h1>
                <p>Discover the ultimate app experience designed perfectly for your daily needs.</p>
                <div class="download-buttons">
                    <a href="#"><img src="assets/play_store.png" alt="Play Store"></a>
                    <a href="#"><img src="assets/app_store.png" alt="App Store"></a>
                </div>
            </div>
            <div class="hero-image">
                <img src="assets/peratude.png" alt="App Preview">
            </div>
        </div>
    </section>

    <!-- App Features / Showcase Section -->
    <section id="features" class="showcase">
        <div class="container">
            <h2>App Design & concept</h2>
            <div class="design-banner">
                <img src="assets/design.jpg" alt="App Design Showcase">
            </div>
        </div>
    </section>

    <!-- Screenshots Section -->
    <section id="screens" class="screenshots">
        <div class="container">
            <h2>App Screenshots</h2>
            <div class="screenshot-grid">
                <div class="screen-card">
                    <img src="assets/for_screens.png" alt="Screen 1">
                </div>
                <div class="screen-card">
                    <img src="assets/sec_screens.png" alt="Screen 2">
                </div>
                <div class="screen-card">
                    <img src="assets/thhh_screens.png" alt="Screen 3">
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer id="download">
        <div class="container footer-container">
            <p>&copy; 2026 Catchhub. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
