    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-film"></i> CATALOG-Z</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Photos</a></li>
                    <li><a href="videos.html">Videos</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container content-section">
        <div class="contact-wrapper-card">
            <h2>Contact Our Technical Support</h2>
            <p class="form-subtitle">Have inquiries regarding the automated media stream? Drop us a line.</p>
            
            <form class="custom-contact-form" action="#">
                <div class="form-group">
                    <input type="text" placeholder="Your Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea rows="6" placeholder="Write your message or alignment question here..." required></textarea>
                </div>
                <button type="submit" class="form-submit-btn">Send Secure Message</button>
            </form>
        </div>
    </main>
